<!DOCTYPE html>
<html lang="en">

<head>
  <title>Test AJAX page</title>
  <link rel="stylesheet" type="text/css" href="./lab_styles.css">
</head>

<body>
  <div class="container">
    <div class="wrapper">
      <div class="header">API Loader</div>
      <button class="button" onclick="loadData()">Load Some JSON from a server</button>
      <div class="content"></div>
      <div class="footer"></div>
    </div>
  </div>
  <script>
    function loadData() {
      console.log('fetch'); // confirm code is running on click
      fetch('/api')
        .then(res => res.json())
        .then(res => res.data.map(c => c.course_id + ":" + c.name))
        .then(res => {
           // logging step to check what we got
          console.log(res);
          olstr = "<ol>";
          for (i=0; i<res.length; i++) {
            olstr += "<li>" + res[i] + "</li>"
          }
          olstr += "</ol>"
          return olstr;
        })
        .then(codes => document.querySelector(".content").innerHTML = codes);
    }
  </script>
</body>

</html>
