<!DOCTYPE html>
<html lang="en">

<head>
  <title>Test AJAX page</title>
  <link rel="stylesheet" type="text/css" href="./lab_styles.css">
</head>

<body>
  <div class="container">
    <div class="wrapper">
      <div class="header">Test AJAX page</div>
      <button class="button" onclick="loadData()">Load Some JSON</button>
      <div class="content"></div>
      <div class="footer"></div>
    </div>
  </div>
  <script>
    function loadData() {
      fetch('ajax_sample.json')
        .then(res => res.json())
        .then(res => randRes(res))
        .then(codes => writeRes(codes))
        .then(codes => document.querySelector(".content").innerHTML = codes);
    }

    function randRes(res) {
      arr = new Array();
      for (var i = 0; i < 15; i++) {
        var rand_country = res[Math.floor(Math.random() * res.length)].name;
        console.log(rand_country);
        arr.push(rand_country);
      }
      return arr;
    }

    function writeRes(res) {
      ol_res = "<ol>";
      for (var i=0; i<res.length; i++) {
        ol_res += "<li>" + res[i] + "</li>";
      }
      ol_res += "</ol>";
      return ol_res;
    }
  </script>
</body>

</html>
