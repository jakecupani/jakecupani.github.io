<!DOCTYPE html>
<html lang="en">

<head>
  <title>Test AJAX page</title>
  <link rel="stylesheet" type="text/css" href="./lab_styles.css">
</head>

<body>
  <div class="container">
    <div class="wrapper">
      <div class="header">UMD Bus Routes</div>
      <button class="button" onclick="loadData()">Load Some JSON</button>
      <div class="content"></div>
      <div class="footer"></div>
    </div>
  </div>
  <script>
    function loadData() {
      fetch('https://api.umd.io/v0/bus/routes')
        .then(res => res.json())
        .then(res => {
          // you can now work in this area
          console.log(res);
          var ul_tag = "<ul>";
          for (var i = 0; i < res.length; i++) {
            var route_id = res[i].route_id;
            var title = res[i].title;
            var li_tag = "<li>" + route_id + " " + title + "</li>";
            ul_tag += li_tag;
          }
          var metro = res.find(function (res) {
            return res.title === "104 College Park Metro";
          });
          console.log(metro);
          document.querySelector(".header").innerHTML = metro.title;
          ul_tag += "</ul>";
          return ul_tag;
        })
        .then(data => document.querySelector(".content").innerHTML = data);
    }
  </script>
</body>

</html>
